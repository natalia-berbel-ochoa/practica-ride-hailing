services:
  postgres:
    image: postgres:16
    container_name: ride_hailing
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ride_hailing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
      - ./permissions.sql:/docker-entrypoint-initdb.d/03-permissions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ride_hailing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: